<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可视化大屏 — 徐钦阳 UI/UX 作品集</title>
    <style id="theme-vars">
/* ── Brand Design Tokens ── */
/* 徐钦阳 UI/UX Portfolio — Dark Tech Style */

:root {
  color-scheme: dark;

  /* ── Core Palette ── */
  --color-bg: #080c13;
  --color-bg-soft: #0d1420;
  --color-bg-body:
    radial-gradient(circle at 82% 12%, rgba(255, 255, 255, 0.035), transparent 34rem),
    radial-gradient(circle at 10% 18%, rgba(255, 255, 255, 0.018), transparent 26rem),
    linear-gradient(180deg, #10131a 0%, #0d1016 48%, #090b10 100%);

  --color-surface: rgba(16, 24, 39, 0.72);
  --color-surface-strong: rgba(20, 31, 51, 0.92);
  --color-border: rgba(156, 187, 226, 0.16);
  --color-border-strong: rgba(156, 187, 226, 0.28);

  --color-text-primary: #f7fbff;
  --color-text-secondary: #9fb0c8;
  --color-text-muted: #6f809b;

  --color-primary: #1d8cff;
  --color-primary-tint: rgba(29, 140, 255, 0.12);

  /* ── Accent Colors (project-specific, used as --accent inline) ── */
  --color-cyan: #20d4ff;
  --color-blue: #55a8ff;
  --color-green: #38d8a0;
  --color-purple: #8a7cff;
  --color-orange: #f5b05d;

  /* ── State Colors ── */
  --state-success: #32d98b;
  --state-warning: #ff9f43;
  --state-error: #ff4d6a;
  --state-info: #20d4ff;

  /* ── Radius Scale ── */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-full: 9999px;

  /* ── Spacing ── */
  --spacing-xs: 4px;
  --spacing-sm: 8px;
  --spacing-md: 16px;
  --spacing-lg: 24px;
  --spacing-xl: 32px;
  --spacing-2xl: 48px;
  --spacing-3xl: 64px;
  --spacing-4xl: 88px;

  /* ── Layout ── */
  --max-width: 1180px;
  --max-width-hero: 1760px;
  --topbar-height: 76px;

  /* ── Shadows (border-first, minimal shadow) ── */
  --shadow-surface: 0 1px 0 rgba(156, 187, 226, 0.06);
  --shadow-elevated: 0 4px 24px rgba(0, 0, 0, 0.05), 0 1px 0 rgba(156, 187, 226, 0.08);
  --shadow-floating: 0 8px 32px rgba(0, 0, 0, 0.12), 0 2px 0 rgba(156, 187, 226, 0.06);

  /* ── Typography ── */
  --font-sans:
    Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
    "PingFang SC", "Microsoft YaHei", sans-serif;
  --font-mono: "JetBrains Mono", "Fira Code", ui-monospace, monospace;

  --font-size-xs: 0.75rem;
  --font-size-sm: 0.875rem;
  --font-size-base: 1rem;
  --font-size-lg: 1.125rem;
  --font-size-xl: 1.25rem;
  --font-size-2xl: 1.5rem;
  --font-size-3xl: 2rem;
  --font-size-4xl: 2.75rem;
  --font-size-5xl: 3.5rem;

  --line-height-tight: 1.2;
  --line-height-normal: 1.6;
  --line-height-relaxed: 1.75;

  --letter-spacing-tight: -0.02em;
  --letter-spacing-normal: 0;
  --letter-spacing-wide: 0.05em;

  /* ── Transitions ── */
  --transition-fast: 150ms ease;
  --transition-normal: 250ms ease;
  --transition-slow: 400ms ease;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-surface); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }
    </style>
</head>
<body class="min-h-screen font-sans antialiased">
    <main class="min-h-screen" style="background: var(--color-bg-body); color: var(--color-text-primary);">

      <!-- Topbar -->
      <header class="fixed top-0 left-0 w-full z-50" style="height: var(--topbar-height); background: rgba(8, 12, 19, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--color-border);">
        <div class="flex items-center justify-between h-full max-w-[var(--max-width-hero)] mx-auto px-6 lg:px-10">
          <a href="index.html" data-dom-id="back-to-list" class="flex items-center gap-2 group" style="color: var(--color-text-secondary);">
            <i data-lucide="arrow-left" class="w-4 h-4 transition-transform duration-150 group-hover:-translate-x-0.5"></i>
            <span class="text-sm font-medium whitespace-nowrap">返回项目</span>
          </a>
          <nav class="flex items-center gap-6">
            <span class="text-sm whitespace-nowrap" style="color: var(--color-text-muted);">徐钦阳 UI/UX</span>
          </nav>
        </div>
      </header>

      <!-- Page Shell: Sidebar + Content -->
      <div class="flex pt-[var(--topbar-height)]">

        <!-- Sidebar -->
        <aside class="hidden lg:flex flex-col fixed top-[var(--topbar-height)] left-0 w-[240px] h-[calc(100vh-var(--topbar-height))] p-6" style="border-right: 1px solid var(--color-border);">
          <div class="mb-8">
            <p class="text-xs font-medium tracking-widest uppercase mb-1" style="color: var(--color-text-muted);">项目</p>
            <h2 class="text-lg font-semibold" style="color: var(--color-text-primary); word-break: keep-all;">可视化大屏</h2>
          </div>
          <nav class="flex flex-col gap-4 flex-1">
            <a href="#hero" class="text-sm whitespace-nowrap transition-colors duration-150" style="color: var(--color-primary);">项目封面</a>
            <a href="#screens" class="text-sm whitespace-nowrap transition-colors duration-150 hover:text-[var(--color-text-primary)]" style="color: var(--color-text-secondary);">政务大屏</a>
            <a href="#additional" class="text-sm whitespace-nowrap transition-colors duration-150 hover:text-[var(--color-text-primary)]" style="color: var(--color-text-secondary);">更多案例</a>
            <a href="#switch" class="text-sm whitespace-nowrap transition-colors duration-150 hover:text-[var(--color-text-primary)]" style="color: var(--color-text-secondary);">其他项目</a>
          </nav>
          <div class="mt-auto pt-6" style="border-top: 1px solid var(--color-border);">
            <p class="text-xs" style="color: var(--color-text-muted);">2024</p>
          </div>
        </aside>

        <!-- Main Content Area -->
        <div class="flex-1 lg:ml-[240px]">

          <!-- Hero Section -->
          <section id="hero" class="w-full">
            <div class="max-w-[var(--max-width-hero)] mx-auto px-4 sm:px-6 lg:px-10 py-8 lg:py-12">
              <img src="../assets/28.jpg" alt="可视化大屏项目封面" class="w-full rounded-lg" style="border: 1px solid var(--color-border);" loading="eager">
            </div>
          </section>

          <!-- Screens Section -->
          <section id="screens" class="w-full">
            <div class="max-w-[var(--max-width-hero)] mx-auto px-4 sm:px-6 lg:px-10 py-8 lg:py-12">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <img src="../assets/29.jpg" alt="政务大屏设计一" class="w-full rounded-lg" style="border: 1px solid var(--color-border);" loading="lazy">
                <img src="../assets/30.jpg" alt="政务大屏设计二" class="w-full rounded-lg" style="border: 1px solid var(--color-border);" loading="lazy">
              </div>
            </div>
          </section>

          <!-- Additional Section -->
          <section id="additional" class="w-full">
            <div class="max-w-[var(--max-width-hero)] mx-auto px-4 sm:px-6 lg:px-10 py-8 lg:py-12">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <img src="../assets/31.jpg" alt="校园监控大屏" class="w-full rounded-lg" style="border: 1px solid var(--color-border);" loading="lazy">
                <img src="../assets/32.jpg" alt="Web监控平台" class="w-full rounded-lg" style="border: 1px solid var(--color-border);" loading="lazy">
              </div>
            </div>
          </section>

          <!-- Project Switch Section -->
          <section id="switch" class="w-full">
            <div class="max-w-[var(--max-width-hero)] mx-auto px-4 sm:px-6 lg:px-10 py-12 lg:py-16">
              <h3 class="text-xl font-semibold mb-8" style="color: var(--color-text-primary); word-break: keep-all;">更多项目</h3>
              <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">

                <!-- Switch Card: 东上数科AI外呼 -->
                <a href="bot.html" data-dom-id="switch-bot" class="group block rounded-lg overflow-hidden transition-transform duration-200 hover:-translate-y-1" style="background: var(--color-surface); border: 1px solid var(--color-border);">
                  <div class="aspect-[16/10] overflow-hidden">
                    <img src="../assets/2.jpg" alt="东上数科AI外呼" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105" loading="lazy">
                  </div>
                  <div class="p-4">
                    <p class="text-sm font-medium truncate" style="color: var(--color-text-primary);">东上数科AI外呼</p>
                  </div>
                </a>

                <!-- Switch Card: U途RPA -->
                <a href="rpa.html" data-dom-id="switch-rpa" class="group block rounded-lg overflow-hidden transition-transform duration-200 hover:-translate-y-1" style="background: var(--color-surface); border: 1px solid var(--color-border);">
                  <div class="aspect-[16/10] overflow-hidden">
                    <img src="../assets/10.jpg" alt="U途RPA" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105" loading="lazy">
                  </div>
                  <div class="p-4">
                    <p class="text-sm font-medium truncate" style="color: var(--color-text-primary);">U途RPA</p>
                  </div>
                </a>

                <!-- Switch Card: AI 工作流 (next) -->
                <a href="ai-workflow.html" data-dom-id="switch-ai-workflow" class="group block rounded-lg overflow-hidden transition-transform duration-200 hover:-translate-y-1" style="background: var(--color-surface); border: 1px solid var(--color-border);">
                  <div class="aspect-[16/10] overflow-hidden">
                    <img src="../assets/18.jpg" alt="AI 工作流" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105" loading="lazy">
                  </div>
                  <div class="p-4">
                    <p class="text-sm font-medium truncate" style="color: var(--color-text-primary);">AI 工作流</p>
                  </div>
                </a>

                <!-- Switch Card: 设计自驱动 -->
                <a href="design-driven.html" data-dom-id="switch-design-driven" class="group block rounded-lg overflow-hidden transition-transform duration-200 hover:-translate-y-1" style="background: var(--color-surface); border: 1px solid var(--color-border);">
                  <div class="aspect-[16/10] overflow-hidden">
                    <img src="../assets/24.jpg" alt="设计自驱动" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105" loading="lazy">
                  </div>
                  <div class="p-4">
                    <p class="text-sm font-medium truncate" style="color: var(--color-text-primary);">设计自驱动</p>
                  </div>
                </a>

              </div>
            </div>
          </section>

        </div>
      </div>

    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
